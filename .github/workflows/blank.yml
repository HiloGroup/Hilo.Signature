name: Auto Release EXE

on:
  push:
    branches:
      - PublishHttps
      - PublishHttp
      - PublishAll

jobs:
  create-release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install ClamAV and Get Config Path
        run: |
          # Cài đặt ClamAV
          choco install clamav --force
          
          # Tìm đường dẫn chính xác đến thư mục ClamAV được cài đặt
          $ClamAVDir = Get-ChildItem -Path C:\ProgramData\Chocolatey\lib\clamav\tools | Select-Object -ExpandProperty FullName
          
          # Tạo một tệp cấu hình tạm thời (freshclam.conf)
          # Thêm các cấu hình cần thiết, quan trọng nhất là loại bỏ các ví dụ mẫu (Example)
          $ConfigPath = Join-Path -Path $ClamAVDir -ChildPath "freshclam.conf"
          
          # Ghi nội dung cơ bản vào tệp cấu hình, loại bỏ dòng "Example"
          @("DatabaseOwner clamav", "UpdateLogFile C:\ProgramData\Chocolatey\lib\clamav\tools\freshclam.log") | Out-File -FilePath $ConfigPath -Encoding ASCII -Force
          
          # Chạy freshclam với đường dẫn cấu hình đã tạo
          & "$ClamAVDir\freshclam" --config-file "$ConfigPath"
        shell: powershell

      - name: Scan ZIP and EXE for viruses
        run: |
          clamscan --infected --recursive --no-summary ./HiloPlugin.zip ./HiloPlugin.exe
          if ($LASTEXITCODE -ne 0) {
            Write-Error "Virus detected! Aborting release."
            exit 1
          }
        shell: powershell

      - name: Update Release
        uses: softprops/action-gh-release@v2
        if: success() # Chỉ chạy nếu scan pass
        with:
          tag_name: ${{ github.ref_name == 'PublishHttps' && 'https-latest' || github.ref_name == 'PublishHttp' && 'http-latest' || 'all-latest' }}
          files: |
            ./HiloPlugin.zip
            ./HiloPlugin.exe
          name: Latest Build ${{ github.ref_name }}
          body: Auto-updated release for ${{ github.ref_name }}
          target_commitish: ${{ github.sha }}
          prerelease: false
          generate_release_notes: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}