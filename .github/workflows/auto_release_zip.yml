```yaml
name: Auto Release ZIP

on:
  push:
    branches:
      - PublishHttps
      - PublishHttp
      - PublishAll

jobs:
  create-release:
    runs-on: windows-latest
    permissions:
      contents: write  # Fix lỗi 403
    steps:
      - uses: actions/checkout@v4

      - name: Check and Zip EXE
        run: |
          # Kiểm tra file HiloPlugin.exe tồn tại
          if (Test-Path ./HiloPlugin.exe) {
            Compress-Archive -Path ./HiloPlugin.exe -DestinationPath ./HiloPlugin-${{ github.ref_name }}.zip -Force
          } else {
            Write-Error "File HiloPlugin.exe not found in repository root!"
            exit 1
          }

      - name: Update Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name == 'PublishHttps' && 'https-latest' || github.ref_name == 'PublishHttp' && 'http-latest' || 'all-latest' }}
          files: HiloPlugin-${{ github.ref_name }}.zip  # Tên file ZIP sau khi zip
          name: Latest ${{ github.ref_name }} Build
          body: Auto-updated release for ${{ github.ref_name }} on commit ${{ github.sha }}
          target_commitish: ${{ github.sha }}
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
```